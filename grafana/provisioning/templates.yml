apiVersion: 1
templates:
  - name: discord.embed
    template: |
      {{ define "discord.embed" -}}
      {
        "embeds": [{
          "color": {{ if eq .Status "firing" }}15158332{{ else }}3066993{{ end }},
          "title": "{{ if eq .Status "firing" }}🔴 FIRING{{ else }}✅ RESOLVED{{ end }} — {{ len .Alerts.Firing }} firing / {{ len .Alerts.Resolved }} resolved",
          "description": "{{ range .Alerts.Firing }}**{{ .Labels.alertname }}** — `{{ .Labels.severity }}`\n{{ .Annotations.summary }}\n\n{{ end }}{{ range .Alerts.Resolved }}✅ **{{ .Labels.alertname }}** — Resolved\n\n{{ end }}[View Dashboard]({{ .ExternalURL }})",
          "footer": { "text": "pm-observability" }
        }]
      }
      {{- end }}
